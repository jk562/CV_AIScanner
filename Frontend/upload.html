<!DOCTYPE html>
<html>
<head>
    <title>Upload Resumes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename='BG3.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h3 style="color: #51ffff;">Create Job & Upload Resumes</h3>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="POST" enctype="multipart/form-data" id="upload-form">
        <label style="color: white;" class="form-label">Job Title</label>
        <input class="form-control mb-3" type="text" name="job_title" required>

        <label style="color: white;" class="form-label">Job Description</label>
        <textarea class="form-control mb-3" name="job_description" rows="6" required></textarea>

        <label style="color: white;" class="form-label">Upload Resumes (PDF/DOCX, multiple allowed)</label>
        <input class="form-control mb-3" type="file" name="resumes" multiple accept=".pdf,.docx" required>

        <button class="btn btn-primary w-100" type="submit" id="submit-btn">Analyze & Rank</button>
    </form>
    <div id="loading" style="display:none;" class="text-center mt-4">
        <div class="spinner-border text-light" role="status"></div>
        <p style="color: white;" class="mt-2">Analyzing resumes, please wait...</p>
    </div>
</div>
<script>
const resumeInput = document.getElementById('resume-input');
const fileListEl = document.getElementById('file-list');
let selectedFiles = [];

function renderFileList() {
    fileListEl.innerHTML = '';
    selectedFiles.forEach((file, index) => {
        const item = document.createElement('li');
        item.className = 'list-group-item d-flex justify-content-between align-items-center';
        const name = document.createElement('span');
        name.textContent = file.name;
        name.className = 'text-truncate me-2';
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn btn-sm btn-outline-danger';
        removeBtn.textContent = 'Remove';
        removeBtn.addEventListener('click', function() {
            selectedFiles.splice(index, 1);
            syncInputFiles();
            renderFileList();
        });
        item.appendChild(name);
        item.appendChild(removeBtn);
        fileListEl.appendChild(item);
    });
}

function syncInputFiles() {
    const dataTransfer = new DataTransfer();
    selectedFiles.forEach(file => dataTransfer.items.add(file));
    resumeInput.files = dataTransfer.files;
}

resumeInput.addEventListener('change', function() {
    for (const file of resumeInput.files) {
        const isDuplicate = selectedFiles.some(f => f.name === file.name && f.size === file.size);
        if (!isDuplicate) {
            selectedFiles.push(file);
        }
    }
    syncInputFiles();
    renderFileList();
});

document.getElementById('upload-form').addEventListener('submit', function(e) {
    if (selectedFiles.length === 0) {
        e.preventDefault();
        alert('Please select at least one resume.');
        return;
    }
    document.getElementById('loading').style.display = 'block';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'Processing...';
});
</script>
</body>
</html>
