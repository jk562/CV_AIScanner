<!DOCTYPE html>
<html>
<head>
    <title>Upload Resumes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename='BG3.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h3 style="color: #51ffff;">Create Job & Upload Resumes</h3>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="POST" enctype="multipart/form-data" id="upload-form">
        <label style="color: white;" class="form-label">Job Title</label>
        <input class="form-control mb-3" type="text" name="job_title" required>

        <label style="color: white;" class="form-label">Job Description</label>
        <textarea class="form-control mb-3" name="job_description" rows="6" required></textarea>

        <label style="color: white;" class="form-label">Upload Resumes (PDF/DOCX, multiple allowed)</label>
        <input class="form-control mb-3" type="file" name="resumes" multiple accept=".pdf,.docx" required>

        <button class="btn btn-primary w-100" type="submit" id="submit-btn">Analyze & Rank</button>
    </form>
    <div id="loading" style="display:none;" class="text-center mt-4">
        <div class="spinner-border text-light" role="status"></div>
        <p style="color: white;" class="mt-2">Analyzing resumes, please wait...</p>
    </div>
</div>
<script>
document.getElementById('upload-form').addEventListener('submit', function() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'Processing...';
});
</script>
</body>
</html>
